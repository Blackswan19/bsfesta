1 { font-size: 1.5rem; } p { padding: 12px; border-radius: 26px; width: 83%; } .timedate img { max-width: 20px; } .step img { max-width: 85%; height: auto; margin-top: 10px; } video { max-width: 72%; border-radius: 10px; margin-top: -53px; outline: none; z-index: -1; position: relative;} } </style> </head> <body> <div class="timedate"> <a href="music.html"><img src="logo/brand.png" alt="BsFesta Logo"></a> </div> <!-- Download Button --> <button class="download-btn" onclick="downloadPage()"> ⬇️ Download Mini Festa Offline Page </button> <div class="step"> <div class="step-number">Step</div> <div class="step-description">Go to downloaded file Drag the shortcut file to the home screen</div> <a href="logo/add5.png"><img src="logo/add5.png" alt="Step 9 Image"> </a> </div> <br><br> <div class="step-number">Yours Offline page is ready</div> <div class="step"> <hr> <div class="step-description" style="background: black; padding: 5px;">Songs will play even if the files are not on your system.</div> <hr> </div>
      <script>
         function downloadPage() {
            const content = document.documentElement.outerHTML;
